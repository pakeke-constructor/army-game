name: Build
on:
  workflow_dispatch:
    inputs:
      push_itch:
        description: Push to itch.io?
        required: false
        type: boolean
        default: false
      push_steam:
        description: Push to Steam?
        required: false
        type: boolean
        default: false
      steam_build_description:
        description: 'Version description. Must be of the form 0.0.0'  
        required: false
      steam_release_branch: 
        description: 'Steam release branch'
        required: false
        default: 'prerelease'

jobs:
  build-love:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Checkout
      uses: actions/checkout@v5
      with:
        path: game
        fetch-depth: 1

    - name: Build .love File
      working-directory: game
      run: 7z a -mx9 -tzip ../game.love assets lib src *.lua

    - name: Artifact .love File
      uses: actions/upload-artifact@v4
      with:
        name: lovegame
        path: game.love
        if-no-files-found: error
        compression-level: 0

  build-windows:
    runs-on: windows-latest
    needs: build-love
    defaults:
      run:
        shell: cmd
    steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Checkout
      uses: actions/checkout@v5

    - name: Extract LOVE
      run: 7z x -olove build\windows\love-12.0-win64.zip

    - name: Copy love.exe to Resource Build
      # Could be changed to lovec.exe too if needed
      run: copy /y love\love-12.0-win64\love.exe build\windows\love.exe

    - name: Delete love.exe and lovec.exe
      working-directory: love/love-12.0-win64
      run: del /q love.exe && del /q lovec.exe

    - name: Generate Iconset Resource
      working-directory: build/windows
      run: python generate_icon.py

    - name: Generate VersionInfo Resource
      env:
        VERSION: '0.0.0' # TODO: More reliable versioning
      working-directory: build/windows
      run: python generate_resource_data.py %VERSION% version.rc.in version.rc

    - name: Compile VersionInfo Resource
      working-directory: build/windows
      run: start /WAIT ResourceHacker.exe -open version.rc -save version.res -action compile

    - name: Replace love.exe Resources
      shell: cmd
      working-directory: build/windows
      run: start /WAIT ResourceHacker.exe -script resourcehackerscript.txt

    - name: Download game.love Artifact
      uses: actions/download-artifact@v5
      with:
        name: lovegame
        # The artifact name is lovegame, contains 1 file: game.love

    - name: Fuse
      run: copy /b build\windows\love_manifested.exe+game.love love\love-12.0-win64\game.exe
    
    - name: Copy Dependent DLLs
      run: |
        copy build\windows\luasteam.dll love\love-12.0-win64\luasteam.dll || exit /b 1
        copy build\windows\steam_api64.dll love\love-12.0-win64\steam_api64.dll || exit /b 1

    - name: Archive Game
      working-directory: love/love-12.0-win64
      run: |
        del game.ico || exit /b 1
        del love.ico || exit /b 1
        7z a -mx9 ..\..\game.zip * || exit /b 1

    - name: Artifact Windows Builds
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: game.zip
        if-no-files-found: error
        compression-level: 0

  build-linux:
    runs-on: ubuntu-latest
    needs: build-love
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Extract LOVE
      run: build/linux/love.AppImage --appimage-extract

    - name: Update Extracted AppImage
      run: |
        set -e

        sudo chown -R $USER:$USER squashfs-root
        mkdir -p squashfs-root/lib/lua/5.1
        cp build/linux/luasteam.so squashfs-root/lib/lua/5.1/luasteam.so
        cp build/linux/libsteam_api.so squashfs-root/lib/libsteam_api.so
        rm squashfs-root/love.svg squashfs-root/love.desktop

    - name: Download game.love Artifact
      uses: actions/download-artifact@v5
      with:
        name: lovegame
        # The artifact name is lovegame, contains 1 file: game.love

    - name: Fuse
      working-directory: squashfs-root
      run: |
        set -e

        cat bin/love ../game.love > bin/catx11
        rm bin/love
        sed -i 's#$APPDIR/bin/love#$APPDIR/bin/catx11#' AppRun
        chmod +x AppRun bin/catx11

    - name: Tar
      working-directory: squashfs-root
      run: tar cvf ../game.tar *

    - name: Artifact Linux Builds
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: game.tar
        if-no-files-found: error
        compression-level: 0

  publish-build:
    runs-on: ubuntu-latest
    needs: [build-love, build-windows]
    if: inputs.push_itch
    steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Secrets Check
      id: check
      shell: python
      env:
        BUTLER_CREDENTIALS : ${{ secrets.BUTLER_API_KEY }}
        ITCH_GAME: incremental-game-1
        ITCH_USER: codetheory
      run: |
        import os

        def test_env(name: str):
            return not not os.environ.get(name)

        ENV_TO_TEST = ["BUTLER_CREDENTIALS", "ITCH_GAME", "ITCH_USER"]
        ok = int(all(map(test_env, ENV_TO_TEST)))

        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"ok={ok}\n")

    - name: Download game.love Artifact
      uses: actions/download-artifact@v5
      if: 'steps.check.outputs.ok == 1'
      with:
        name: lovegame

    - name: Download Windows Binaries Artifact
      uses: actions/download-artifact@v5
      if: 'steps.check.outputs.ok == 1'
      with:
        name: windows-build

    - name: Butler Push Windows
      uses: XanatosX/butler-publish-itchio-action@fb0a6f13954b75e8fbcfb703dbdb8626452efaba
      if: 'steps.check.outputs.ok == 1'
      env:
        BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
        CHANNEL: windows
        ITCH_GAME: incremental-game-1
        ITCH_USER: codetheory
        PACKAGE: game.zip

  publish-steam:
    runs-on: ubuntu-latest
    if: inputs.push_steam
    needs: [build-windows, build-linux]
    steps:
    - name: Test Secrets Validity
      env:
        STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF}}
      shell: python
      run: |
        import os

        if not (os.environ.get("STEAM_USERNAME") and os.environ.get("STEAM_CONFIG_VDF")):
          raise Exception("Secrets are improperly set up!")

    - name: Prepare Build
      run: |
        set -e
        mkdir -p build/win64 build/linux64
    
    - name: Download Windows Artifact
      uses: actions/download-artifact@v5
      with:
        name: windows-build

    - name: Extract Windows Artifact
      working-directory: build/win64
      run: 7z x ../../game.zip
    
    - name: Download Linux Artifact
      uses: actions/download-artifact@v5
      with:
        name: linux-build

    - name: Extract Linux Artifact
      working-directory: build/linux64
      run: tar xvf ../../game.tar

    - name: Publish to Steam
      uses: game-ci/steam-deploy@v3
      continue-on-error: false
      with:
        username: ${{ secrets.STEAM_USERNAME }}
        configVdf: ${{ secrets.STEAM_CONFIG_VDF}}

        appId: 4173020
        buildDescription: ${{ inputs.steam_build_description }}

        rootPath: build
        depot1Path: win64
        # depot2Path: linux64  ## UNCOMMENT THIS WHEN LINUX BUILDS ARE READY.
        releaseBranch: ${{ inputs.steam_release_branch }}
